<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow">
  
    <title>BetPhile – Download APK</title>

    <!-- Google Fonts: Poppins + Orbitron (for futuristic touch) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ── Reset & Base ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #0b0e1a, #03050b);
            padding: 1.5rem;
            overflow-x: hidden;
        }

        /* ── Glowing Orbs (background ambiance) ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }
        .orb--1 {
            width: 50vw;
            height: 50vw;
            background: #6c3ce0;
            top: -10%;
            right: -10%;
            animation-delay: 0s;
        }
        .orb--2 {
            width: 40vw;
            height: 40vw;
            background: #f7b731;
            bottom: -15%;
            left: -10%;
            animation-delay: -4s;
            opacity: 0.3;
        }
        .orb--3 {
            width: 30vw;
            height: 30vw;
            background: #00d4ff;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: -8s;
            opacity: 0.2;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(40px, -30px) scale(1.2);
            }
        }

        /* ── Main Card ── */
        .card {
            position: relative;
            z-index: 1;
            max-width: 580px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 56px;
            padding: 3rem 2.5rem 2.8rem;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
            transition: transform 0.4s ease;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        /* ── Logo Wrapper with Shining Effect ── */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.2rem;
        }

        .logo-wrapper img {
            display: block;
            width: 130px;
            height: 130px;
            border-radius: 32px;
            object-fit: cover;
            box-shadow:
                0 8px 40px rgba(108, 60, 224, 0.35),
                0 0 0 2px rgba(255, 255, 255, 0.05);
            transition: box-shadow 0.4s ease;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Shining overlay (animated sweep) */
        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 40px;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0) 30%,
                rgba(255, 255, 255, 0.5) 50%,
                rgba(255, 255, 255, 0) 70%
            );
            background-size: 300% 300%;
            animation: shineSweep 4s ease-in-out infinite;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        @keyframes shineSweep {
            0% {
                background-position: 200% 200%;
                opacity: 0.2;
            }
            30% {
                opacity: 0.9;
            }
            60% {
                opacity: 0.2;
            }
            100% {
                background-position: -100% -100%;
                opacity: 0;
            }
        }

        /* Glow ring behind logo */
        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108, 60, 224, 0.3) 0%, transparent 70%);
            filter: blur(20px);
            z-index: 1;
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.5;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
        }

        /* ── Typography ── */
        .brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.6rem;
            letter-spacing: 0.06em;
            background: linear-gradient(135deg, #ffffff 0%, #b8a5ff 50%, #6c3ce0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(108, 60, 224, 0.25);
            margin-bottom: 0.1rem;
            line-height: 1.2;
        }

        .tagline {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 1.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1.2rem;
        }

        .tagline i {
            margin: 0 6px;
            color: #f7b731;
        }

        .description {
            font-weight: 400;
            font-size: 0.98rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.7;
            margin-bottom: 2.2rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .description i {
            color: #f7b731;
            margin: 0 4px;
        }

        /* ── Version Badge ── */
        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(108, 60, 224, 0.18);
            border: 1px solid rgba(108, 60, 224, 0.25);
            border-radius: 100px;
            padding: 0.4rem 1.2rem 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #c8b8ff;
            margin-bottom: 2rem;
            letter-spacing: 0.02em;
            backdrop-filter: blur(4px);
        }

        .version-badge i {
            font-size: 0.9rem;
            color: #f7b731;
        }

        /* ── Download Button ── */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            padding: 1.1rem 2rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.03em;
            color: #fff;
            background: linear-gradient(135deg, #6c3ce0, #4a1fa0);
            border: none;
            border-radius: 80px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow:
                0 8px 32px rgba(108, 60, 224, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .download-btn i {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .download-btn span {
            position: relative;
            z-index: 2;
        }

        /* Shimmer overlay on button */
        .download-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 80px;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0) 20%,
                rgba(255, 255, 255, 0.25) 50%,
                rgba(255, 255, 255, 0) 80%
            );
            background-size: 300% 300%;
            animation: btnShine 4s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes btnShine {
            0% {
                background-position: 200% 200%;
                opacity: 0;
            }
            40% {
                opacity: 1;
            }
            60% {
                opacity: 1;
            }
            100% {
                background-position: -100% -100%;
                opacity: 0;
            }
        }

        .download-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow:
                0 14px 48px rgba(108, 60, 224, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .download-btn:hover i {
            transform: translateY(-2px) scale(1.1);
        }

        .download-btn:active {
            transform: scale(0.97);
        }

        /* ── File Info ── */
        .file-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .file-info i {
            margin-right: 6px;
            color: rgba(255, 255, 255, 0.2);
        }

        .file-info .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
        }

        /* ── Social / Extra Icons ── */
        .social-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            background: rgba(108, 60, 224, 0.2);
            border-color: rgba(108, 60, 224, 0.3);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(108, 60, 224, 0.2);
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .card {
                padding: 2rem 1.5rem 2rem;
                border-radius: 40px;
            }

            .brand {
                font-size: 2rem;
            }

            .logo-wrapper img {
                width: 100px;
                height: 100px;
                border-radius: 24px;
            }

            .logo-glow {
                width: 160px;
                height: 160px;
            }

            .logo-wrapper::after {
                border-radius: 32px;
            }

            .download-btn {
                font-size: 1rem;
                padding: 1rem 1.5rem;
                gap: 0.8rem;
            }

            .download-btn i {
                font-size: 1.3rem;
            }

            .tagline {
                font-size: 0.75rem;
                letter-spacing: 0.25em;
            }

            .description {
                font-size: 0.88rem;
                padding: 0 0.2rem;
            }

            .file-info {
                font-size: 0.7rem;
                gap: 0.8rem;
            }

            .version-badge {
                font-size: 0.7rem;
                padding: 0.3rem 1rem;
            }

            .social-links {
                gap: 0.8rem;
            }

            .social-links a {
                width: 36px;
                height: 36px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 1.5rem 1rem 1.8rem;
                border-radius: 32px;
            }

            .brand {
                font-size: 1.6rem;
            }

            .logo-wrapper img {
                width: 80px;
                height: 80px;
                border-radius: 20px;
            }

            .logo-glow {
                width: 130px;
                height: 130px;
            }

            .download-btn {
                font-size: 0.9rem;
                padding: 0.8rem 1.2rem;
            }

            .file-info {
                flex-direction: column;
                gap: 0.4rem;
            }
            .file-info .dot {
                display: none;
            }
        }

        /* ── Scrollbar (just for polish) ── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0e1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #6c3ce0;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <!-- Ambient Orbs -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <!-- ─── Main Card ─── -->
    <main class="card">

        <!-- Logo with Shining Effect -->
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <!-- Replace src with your actual logo.png path -->
            <img src="logo.png" alt="BetPhile Logo" />
        </div>

        <!-- Brand Name -->
        <h1 class="brand">BetPhile</h1>

        <!-- Tagline -->
        <p class="tagline">
            <i class="fas fa-microchip"></i>
            Artificial Intelligence
            <i class="fas fa-robot"></i>
        </p>

        <!-- Description -->
        <p class="description">
            <i class="fas fa-bolt"></i>
            Experience the next-gen AI-powered platform.
            Download the latest APK and unlock smarter insights.
            <i class="fas fa-bolt"></i>
        </p>

        <!-- Version Badge -->
        <div class="version-badge">
            <i class="fas fa-tag"></i>
            v1.3 &nbsp;·&nbsp; <i class="fas fa-check-circle" style="color:#4ade80;"></i> Stable
        </div>

        <!-- Download Button (APK) -->
        <a href="bethile-v1.3.apk" class="download-btn" download>
            <i class="fas fa-download"></i>
            <span>Download APK</span>
            <i class="fas fa-arrow-right" style="font-size:1.1rem;"></i>
        </a>

        <!-- File Info -->
        <div class="file-info">
            <span><i class="fas fa-file"></i> bethile-v1.3.apk</span>
            <span class="dot"></span>
            <span><i class="fas fa-weight-hanging"></i> ~6.5 MB</span>
            <span class="dot"></span>
            <span><i class="fas fa-shield-alt"></i> Secure</span>
        </div>

        <!-- Social / Extra Links -->
        <div class="social-links">
            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="#" aria-label="Discord"><i class="fab fa-discord"></i></a>
            <a href="#" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
        </div>

    </main>

</body>
</html>
